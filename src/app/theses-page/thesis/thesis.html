<fieldset class="flex flex-col gap-y-4 md:gap-y-16">
  <app-thesis-text class="text-xl md:text-3xl font-semibold" [text]="thesis()" />

  <div class="grid grid-rows-5 md:grid-cols-5 gap-x-8 gap-y-2">
    @let name = 'question-0';
    @for (answer of model.answer_possibilities; track $index) {
      @let id = name + '-answer-' + $index;
      <label [for]="id"
        [style.color]="answer.colour"
        class="relative border-4 rounded-xl flex flex-row justify-between md:flex-col gap-2 py-2 px-2 hover:bg-neutral-100 has-focus-visible:bg-neutral-100"
        [class.bg-neutral-200]="form()().value() === answer.answer"
      >
        <input
          tabindex="0"
          type="radio"
          [name]="name"
          [id]="id"
          class="w-full h-full absolute -translate-y-2 opacity-0 cursor-pointer"
          [value]="answer.answer"
          (change)="select_option($index)"
          [checked]="form()().value() === answer.answer"
        />
        <fa-icon [icon]="answer.icon" class="md:mx-auto text-2xl md:text-4xl" />
        <span class="m-auto text-black">{{ answer.text | localised }}</span>
      </label>
    }
  </div>
</fieldset>
